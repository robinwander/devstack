# devstack config for augment-voice monorepo
version = 1
default_stack = "voice"

# NOTE: Start MySQL + migrations manually first:
#   cd packages/voice_api_v2 && docker compose up -d
#   poetry run alembic upgrade head

[stacks.voice]
description = "Full voice simulation stack"

[stacks.voice.services.voice-server]
cmd = "poetry run start-server --reload --port $PORT"
cwd = "packages/voice_api_v2"
env_file = ".env"
readiness = { http = { path = "/health" }, timeout_ms = 60000 }

[stacks.voice.services.voice-server.env]
ENVIRONMENT = "local"

[stacks.voice.services.voice-worker]
cmd = "poetry run start-worker"
cwd = "packages/voice_api_v2"
port = "none"
deps = ["voice-server"]
env_file = ".env"
readiness = { delay_ms = 5000 }

[stacks.voice.services.voice-worker.env]
ENVIRONMENT = "local"

[stacks.voice.services.test-worker]
cmd = "poetry run python -m augment.call_simulation.voice.test_agent.worker dev"
cwd = "packages/call_simulation"
port = "none"
deps = ["voice-worker"]
env_file = "../voice_api_v2/.env"
readiness = { delay_ms = 5000 }

[stacks.voice.services.test-worker.env]
ENVIRONMENT = "local"

[stacks.voice.services.api]
cmd = "poetry run python -m augment.call_simulation.voice.api.fastapi_server"
cwd = "packages/call_simulation"
deps = ["test-worker"]
env_file = "../voice_api_v2/.env"
readiness = { http = { path = "/health" }, timeout_ms = 60000 }

[stacks.voice.services.api.env]
SIM_API_RELOAD = "1"

[stacks.voice.services.ui]
cmd = "pnpm run dev --port $PORT --host 127.0.0.1"
cwd = "packages/call_simulation/ui"
deps = ["api"]
readiness = { http = { path = "/", expect_status = [200, 399] } }

[stacks.voice.services.ui.env]
VITE_API_URL = "{{ services.api.url }}"
